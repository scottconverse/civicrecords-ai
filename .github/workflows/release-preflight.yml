name: release-preflight

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing signed release tag to verify before publishing the GitHub Release
        required: true
        type: string
      expected_target:
        description: Expected target commit SHA for the release tag
        required: false
        type: string
      expected_tree:
        description: Expected target tree SHA from the verified release build
        required: false
        type: string
      attestation:
        description: Optional path to a prepared release-attestation.json in the checked-out tree
        required: false
        type: string
      bundle:
        description: Optional path to a prepared release-attestation.json.bundle in the checked-out tree
        required: false
        type: string
      artifacts_dir:
        description: Optional path to release artifacts named by the attestation
        required: false
        type: string
      fixtures_only:
        description: Run only CivicCore's adversarial fixture suite as a hypothetical corrected-release dry-run
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  preflight-release-provenance:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install CivicCore release-provenance helper
        run: python -m pip install "git+https://github.com/CivicSuite/civiccore.git@main"
      - name: Checkout canonical CivicCore provenance fixtures
        uses: actions/checkout@v6
        with:
          repository: CivicSuite/civiccore
          ref: main
          path: .tmp-civiccore
      - name: Verify adversarial release provenance fixtures
        run: python scripts/verify-release-provenance.py --fixtures-dir .tmp-civiccore/tests/fixtures/release_provenance
      - name: Install cosign
        if: ${{ inputs.fixtures_only != 'true' }}
        uses: sigstore/cosign-installer@v4.1.1
      - name: Verify current release tag provenance
        if: ${{ inputs.fixtures_only != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          EXPECTED_TARGET: ${{ inputs.expected_target }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          ATTESTATION: ${{ inputs.attestation }}
          BUNDLE: ${{ inputs.bundle }}
          ARTIFACTS_DIR: ${{ inputs.artifacts_dir }}
        run: |
          cmd=(python scripts/verify-release-provenance.py "${RELEASE_TAG}" --repo "${{ github.repository }}")
          if [ -n "${ATTESTATION}" ]; then cmd+=(--attestation "${ATTESTATION}"); fi
          if [ -n "${BUNDLE}" ]; then cmd+=(--bundle "${BUNDLE}"); fi
          if [ -n "${ARTIFACTS_DIR}" ]; then cmd+=(--artifacts-dir "${ARTIFACTS_DIR}"); fi
          if [ -n "${EXPECTED_TARGET}" ]; then cmd+=(--expected-target "${EXPECTED_TARGET}"); fi
          if [ -n "${EXPECTED_TREE}" ]; then cmd+=(--expected-tree "${EXPECTED_TREE}"); fi
          "${cmd[@]}"
